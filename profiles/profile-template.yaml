version: 1
id: <profile-id>
label: <human-readable label>
family: <vertical-short|episodic-cinematic|webtoon-motion|character-ip|custom>
engine: <hook-driven|cinematic-emotion|panel-motion|character-loop|custom>
description: >-
  <一句话说明这个 profile 默认服务哪类 AI 漫剧。>
selection_hints:
  suitable_for:
    - <适用场景 1>
  avoid_when:
    - <不适用场景 1>
input_extensions:
  required_questions:
    - id: <question-id>
      prompt: <相对于通用输入还要额外问用户什么>
defaults:
  production_artifacts:
    required:
      - path: <anime/...>
        purpose: <这个制品解决什么问题>
    optional:
      - path: <anime/...>
        purpose: <何时需要>
  phase_catalog:
    - id: <phase-id>
      purpose: <该 phase 的作用>
      required: true
  agent_catalog:
    phase_agents:
      - id: <phase-id>-agent
        owner_phase_id: <phase-id>
        purpose: <该 phase agent 负责的合同、边界和 handoff>
    node_agents:
      - id: <workflow-node-id>-agent
        node_id: <workflow-node-id>
        owner_phase_id: <phase-id>
        purpose: <该创作节点负责的输入输出与质量门禁>
    adapter_agents:
      - id: <adapter-slot>-agent
        adapter_slot: <adapter-slot>
        purpose: <该 adapter agent 在人工确认后如何消费 provider-neutral jobs>
quality_focus:
  - <finalize/review 时要重点检查什么>
common_md_must_cover:
  - <必须进入 plan/common.md 的长期约束主题>
recommended_overlays:
  - <overlay-id，必须来自 profiles/overlays.yaml>
